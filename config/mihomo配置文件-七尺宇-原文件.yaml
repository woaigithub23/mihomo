# mihomo配置文件，作者：七尺宇 链接 https://github.com/qichiyuhub/rule/blob/main/config/mihomo/configdns.yaml
# DNS防泄露版本，TUN开启,IPv6关闭，fake-ip开启

# ============================================ #
# 配置文件DNS和tun模式解读
# 1. 核心指挥官：respect-rules: true
# 这是你配置中最关键的一行。它的存在打破了“所有 DNS 请求一锅端”的局面。逻辑：当一个域名进入解析流程，Mihomo 不会直接去问 nameserver（谷歌）。它会先拿着域名去匹配你下方的 rules（规则集）。
# 分流结果：如果命中了 apple_domain、cn_domain 或 private_domain 等 “直连 (DIRECT)” 规则，Mihomo 会优先调用 direct-nameserver（即你的阿里 DNS 和 DNSPod）。
# 只有当命中了 “代理 (Proxy)” 规则（如 google_domain、youtube_domain），或者在规则匹配中“无法确定”时，它才会去请求 nameserver（谷歌 8.8.8.8）。

# 2. TUN 模式下的两阶段解析过程
# 在 fake-ip 模式下，DNS 解析实际上被分成了两步，国内和国外 DNS 的分工非常明确：
# 第一阶段：给 App “发假药” (Fake-IP 回应)当你的手机 App 发起 DNS 请求（UDP 53）时，由于你开启了 dns-hijack，流量被 TUN 强行抓给 Mihomo。Mihomo 的动作：它根本不问任何 DNS 服务器，直接从 fake-ip-range: 28.0.0.1/8 里随手抓一个 IP 给 App。国内 DNS 参与度：此时为 0。
# 第二阶段：内核“找真身” (真实解析)当 App 开始向这个假 IP（28.0.0.x）发数据包时，Mihomo 必须知道这个包该发往哪里。
# 如果是百度/微信：匹配到 cn_domain。Mihomo 会调用 direct-nameserver 里的阿里 DNS。由于阿里 DNS 就在国内，延迟极低，且返回的是最适合天津联通的 CDN IP。
# 如果是 YouTube/Gemini：匹配到 youtube_domain。Mihomo 会通过 加密代理隧道，使用你配置的那个 8.8.8.8#RULES 去询问。因为加了 &ecs=223.5.5.0/24，谷歌会知道你是个中国用户，尽量给你返回一个离中国近的（如香港/新加坡）节点 IP。
# nameserver	谷歌 (8.8.8.8)	处理所有“代理”流量
# ============================================ #


# 必读！！！
# 注意规则在满足自己需求情况下，尽量做到精简，不要过度复杂，以免影响性能。
# 跑裸核用户请自行去掉下方控制面板模块的注释。
# 机场订阅


proxy-providers:
  Airport1:
    url: "机场订阅填到这里，两端引号不要去掉，不要填写到下方链接里去！！"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连

# 节点信息
proxies:
  - {name: 直连, type: direct}

# 全局配置 
mixed-port: 7890
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true

# 为防止使用插件遇到面板问题，注释掉了此模块。
#external-controller: 0.0.0.0:9090
#secret: ""
#external-ui: ui
#external-ui-name: zashboard
#external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"

# 嗅探（fakeip下其实可以不用嗅探）
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# 入站
tun:
  enable: true
  # system/gvisor/mixed
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  #使用nikki，混入全部不修改的情况，开启接口指定为nikki
  #device: nikki
  #使用仅内核自行修改下面三项为true
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false

# DNS模块
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter-mode: blacklist
  default-nameserver:
    - https://223.5.5.5/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver:
    - https://8.8.8.8/dns-query#RULES&ecs=223.5.5.0/24
  fake-ip-filter:
    - "rule-set:fakeipfilter_domain"
 
# 出站策略，根据自己情况调整每个策略里分组排序，增删都可以，比如把美国自动放到第一个，比如删除香港故转，注意别漏掉表情逗号等。
# 如果相应分组没有筛选到对应的国家，请根据自己节点名字调整筛选关键字。
# 没有再使用锚点，是考虑很多新手修改难度，这样新手修改某个分组更容易些。
